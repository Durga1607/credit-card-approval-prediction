{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white text-center py-3">

            <h2>
                <i class="bi bi-credit-card-2-front-fill"></i>
                Credit Card Approval Prediction
            </h2>

            <p class="mb-0">
                Enter the applicant details below.
            </p>

        </div>

        <div class="card-body">

            <form action="/predict" method="POST">

                <!-- ===================================== -->
                <!-- PERSONAL INFORMATION -->
                <!-- ===================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header bg-primary text-white">

                        <h4>

                            <i class="bi bi-person-circle"></i>

                            Personal Information

                        </h4>

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <!-- Gender -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Gender

                                </label>

                                <select
                                    name="CODE_GENDER"
                                    class="form-select"
                                    required>

                                    {% for gender in genders %}

                                    <option value="{{ gender }}">

                                        {{ gender }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Age -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Age

                                </label>

                                <input
                                    type="number"
                                    name="AGE"
                                    class="form-control"
                                    required>

                            </div>

                            <!-- Children -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Number of Children

                                </label>

                                <input
                                    type="number"
                                    name="CNT_CHILDREN"
                                    class="form-control"
                                    value="0"
                                    required>

                            </div>

                            <!-- Family Members -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Family Members

                                </label>

                                <input
                                    type="number"
                                    name="CNT_FAM_MEMBERS"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                    </div>

                </div>
                                <!-- ===================================== -->
                <!-- FINANCIAL INFORMATION -->
                <!-- ===================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header bg-success text-white">

                        <h4>

                            <i class="bi bi-cash-stack"></i>

                            Financial Information

                        </h4>

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <!-- Annual Income -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Annual Income

                                </label>

                                <input
                                    type="number"
                                    name="AMT_INCOME_TOTAL"
                                    class="form-control"
                                    placeholder="Enter Annual Income"
                                    required>

                            </div>

                            <!-- Income Type -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Income Type

                                </label>

                                <select
                                    name="NAME_INCOME_TYPE"
                                    class="form-select"
                                    required>

                                    {% for item in income_types %}

                                    <option value="{{ item }}">

                                        {{ item }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Employment Years -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Employment Years

                                </label>

                                <input
                                    type="number"
                                    step="0.1"
                                    name="EMPLOYMENT_YEARS"
                                    class="form-control"
                                    placeholder="Years of Employment"
                                    required>

                            </div>

                        </div>

                    </div>

                </div>
                 <!-- ===================================== -->
                <!-- ADDITIONAL INFORMATION -->
                <!-- ===================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header bg-info text-white">

                        <h4>

                            <i class="bi bi-house-door-fill"></i>

                            Additional Information

                        </h4>

                    </div>

                    <div class="card-body">

                        <div class="row">

                            <!-- Education -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Education
                                </label>

                                <select name="NAME_EDUCATION_TYPE"
                                        class="form-select"
                                        required>

                                    {% for item in education_types %}

                                    <option value="{{ item }}">
                                        {{ item }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Family Status -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Family Status
                                </label>

                                <select name="NAME_FAMILY_STATUS"
                                        class="form-select"
                                        required>

                                    {% for item in family_statuses %}

                                    <option value="{{ item }}">
                                        {{ item }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Housing Type -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Housing Type
                                </label>

                                <select name="NAME_HOUSING_TYPE"
                                        class="form-select"
                                        required>

                                    {% for item in housing_types %}

                                    <option value="{{ item }}">
                                        {{ item }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Occupation -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Occupation
                                </label>

                                <select name="OCCUPATION_TYPE"
                                        class="form-select"
                                        required>

                                    {% for item in occupations %}

                                    <option value="{{ item }}">
                                        {{ item }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <!-- Own Car -->

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Own Car
                                </label>

                                <select name="FLAG_OWN_CAR"
                                        class="form-select">

                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>

                                </select>

                            </div>

                            <!-- Own House -->

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Own House
                                </label>

                                <select name="FLAG_OWN_REALTY"
                                        class="form-select">

                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>

                                </select>

                            </div>

                            <!-- Phone -->

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Phone Available
                                </label>

                                <select name="FLAG_PHONE"
                                        class="form-select">

                                    <option value="1">Yes</option>
                                    <option value="0">No</option>

                                </select>

                            </div>

                            <!-- Work Phone -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Work Phone
                                </label>

                                <select name="FLAG_WORK_PHONE"
                                        class="form-select">

                                    <option value="1">Yes</option>
                                    <option value="0">No</option>

                                </select>

                            </div>

                            <!-- Email -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email Available
                                </label>

                                <select name="FLAG_EMAIL"
                                        class="form-select">

                                    <option value="1">Yes</option>
                                    <option value="0">No</option>

                                </select>

                            </div>

                        </div>

                    </div>

                </div>
                                <!-- ===================================== -->
                <!-- ACTION BUTTONS -->
                <!-- ===================================== -->

                <div class="row mt-4">

                    <div class="col-md-6 d-grid mb-2">

                        <button type="submit"
                                class="btn btn-primary btn-lg">

                            <i class="bi bi-check-circle-fill"></i>

                            Predict Credit Approval

                        </button>

                    </div>

                    <div class="col-md-6 d-grid mb-2">

                        <button type="reset"
                                class="btn btn-outline-secondary btn-lg">

                            <i class="bi bi-arrow-clockwise"></i>

                            Reset Form

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
